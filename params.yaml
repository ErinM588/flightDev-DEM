local_origin:
  lat: 0.0
  lon: 0.0
  alt: 0.01

takeoff:
  lat: -35.3633285
  lon: -149.1652232
  alt: 0.1

image:
  width_px: 1431
  height_px: 1132
  width_m: 2130
  height_m: 1685
  gsd: 1.49

camera:
  hfov: 60
  aspect: 1.333333

stream:
  url: "rtsp://localhost:8554/stream"

dem:
  path: "island_dem.tif"    # output of georeference_terrain.py — float32 GeoTIFF, EPSG:4326
  step_m: 5.0               # ray-march step size; smaller = more accurate, slower
  max_range_m: 10000.0      # give up after this far along a ray (catches upward/horizontal shots)
  strict: true              # true = all-or-nothing (return None if any corner misses DEM)
                            # false = fall back to flat-ground for missed corners
